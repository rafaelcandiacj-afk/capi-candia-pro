<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capi Când-IA Pro</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ===== AUTH SCREEN ===== */
    .auth-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .auth-container {
      width: 100%;
      max-width: 420px;
      animation: fadeIn 0.4s ease;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-logo .logo-icon {
      font-size: 3.5rem;
      display: block;
      margin-bottom: 8px;
    }

    .auth-logo h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .auth-logo h1 span {
      color: var(--green);
    }

    .auth-logo p {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-top: 4px;
    }

    .auth-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
    }

    .auth-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 28px;
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 4px;
    }

    .auth-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border-radius: 6px;
      transition: var(--transition);
    }

    .auth-tab.active {
      background: var(--bg3);
      color: var(--text);
    }

    .auth-tab:hover:not(.active) {
      color: var(--text);
    }

    #authError {
      display: none;
    }

    #authError.visible {
      display: block;
    }

    /* ===== CHAT SCREEN ===== */
    .chat-wrapper {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }

    .chat-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chat-header-left .logo-icon {
      font-size: 1.5rem;
    }

    .chat-header-left h2 {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .chat-header-left h2 span {
      color: var(--green);
    }

    .chat-header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-name {
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 500;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Welcome screen */
    .chat-welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      text-align: center;
      padding: 40px 20px;
    }

    .chat-welcome .welcome-icon {
      font-size: 4rem;
      margin-bottom: 16px;
    }

    .chat-welcome h3 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .chat-welcome p {
      color: var(--text-muted);
      margin-bottom: 32px;
      max-width: 400px;
    }

    .suggestion-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      max-width: 600px;
    }

    .suggestion-chip {
      padding: 10px 16px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 0.85rem;
      cursor: pointer;
      transition: var(--transition);
      max-width: 260px;
      text-align: left;
    }

    .suggestion-chip:hover {
      border-color: var(--green);
      background: var(--bg3);
      transform: translateY(-2px);
    }

    /* Message bubbles */
    .message {
      display: flex;
      gap: 10px;
      max-width: 80%;
      animation: fadeIn 0.3s ease;
    }

    .message-user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message-assistant {
      align-self: flex-start;
    }

    .message-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .message-user .message-avatar {
      background: var(--green-dark);
    }

    .message-assistant .message-avatar {
      background: var(--bg3);
    }

    .message-bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.6;
      font-size: 0.92rem;
      word-wrap: break-word;
    }

    .message-user .message-bubble {
      background: var(--green-dark);
      border: 1px solid rgba(76, 175, 80, 0.2);
    }

    .message-assistant .message-bubble {
      background: var(--bg3);
      border: 1px solid var(--border);
    }

    .message-bubble strong {
      font-weight: 700;
      color: var(--text);
    }

    /* Typing bubble */
    .message-typing .message-bubble {
      background: var(--bg3);
      border: 1px solid var(--border);
    }

    /* Chat input area */
    .chat-input-area {
      padding: 16px 20px;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .chat-input-container {
      display: flex;
      gap: 10px;
      max-width: 900px;
      margin: 0 auto;
    }

    .chat-input {
      flex: 1;
      padding: 12px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: var(--transition);
      resize: none;
      min-height: 46px;
      max-height: 120px;
    }

    .chat-input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.15);
    }

    .chat-input::placeholder {
      color: var(--text-muted);
    }

    .btn-send {
      width: 46px;
      height: 46px;
      border-radius: var(--radius-sm);
      background: var(--green);
      border: none;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      flex-shrink: 0;
    }

    .btn-send:hover:not(:disabled) {
      background: var(--green-hover);
    }

    .btn-send:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-send svg {
      width: 20px;
      height: 20px;
    }

    /* ===== Responsive ===== */
    @media (max-width: 768px) {
      .auth-card {
        padding: 24px;
      }

      .message {
        max-width: 90%;
      }

      .chat-header {
        padding: 10px 14px;
      }

      .chat-messages {
        padding: 16px 14px;
      }

      .chat-input-area {
        padding: 12px 14px;
      }

      .suggestion-chips {
        flex-direction: column;
        align-items: stretch;
      }

      .suggestion-chip {
        max-width: 100%;
      }

      .user-name {
        display: none;
      }
    }

    @media (max-width: 480px) {
      .auth-logo h1 {
        font-size: 1.4rem;
      }

      .chat-header-left h2 {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>

  <!-- ===== AUTH SCREEN ===== -->
  <div id="authScreen" class="auth-wrapper">
    <div class="auth-container">
      <div class="auth-logo">
        <span class="logo-icon">🦫</span>
        <h1>Capi <span>Când-IA</span> Pro</h1>
        <p>O assistente estratégico para advogados</p>
      </div>

      <div class="auth-card">
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login" onclick="switchTab('login')">Entrar</button>
          <button class="auth-tab" data-tab="register" onclick="switchTab('register')">Criar conta</button>
        </div>

        <div id="authError" class="alert alert-error"></div>

        <form id="authForm" onsubmit="handleAuth(event)">
          <div id="nameGroup" class="input-group hidden">
            <label for="nameInput">Nome</label>
            <input type="text" id="nameInput" class="input-field" placeholder="Seu nome completo">
          </div>

          <div class="input-group">
            <label for="emailInput">Email</label>
            <input type="email" id="emailInput" class="input-field" placeholder="seu@email.com" required>
          </div>

          <div class="input-group">
            <label for="passwordInput">Senha</label>
            <input type="password" id="passwordInput" class="input-field" placeholder="••••••••" required>
          </div>

          <button type="submit" id="authBtn" class="btn btn-primary btn-block" style="margin-top: 8px;">
            Entrar
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- ===== CHAT SCREEN ===== -->
  <div id="chatScreen" class="chat-wrapper hidden">
    <header class="chat-header">
      <div class="chat-header-left">
        <span class="logo-icon">🦫</span>
        <h2>Capi <span>Când-IA</span> Pro</h2>
      </div>
      <div class="chat-header-right">
        <span id="userName" class="user-name"></span>
        <button class="btn btn-secondary btn-sm" onclick="newConversation()">Nova conversa</button>
        <button class="btn btn-secondary btn-sm" onclick="logout()">Sair</button>
      </div>
    </header>

    <div id="chatMessages" class="chat-messages">
      <!-- Welcome screen shown initially -->
      <div id="welcomeScreen" class="chat-welcome">
        <span class="welcome-icon">🦫</span>
        <h3>Olá! Como posso te ajudar?</h3>
        <p>Sou a Capi, sua assistente estratégica para advocacia. Pergunte sobre prospecção, marketing jurídico, precificação e muito mais.</p>
        <div class="suggestion-chips">
          <button class="suggestion-chip" onclick="sendSuggestion(this)">Como prospectar no JusBrasil?</button>
          <button class="suggestion-chip" onclick="sendSuggestion(this)">Tese de Família para Meta Ads</button>
          <button class="suggestion-chip" onclick="sendSuggestion(this)">Como precificar honorários?</button>
          <button class="suggestion-chip" onclick="sendSuggestion(this)">Como sair de escritório massificado?</button>
        </div>
      </div>
    </div>

    <div class="chat-input-area">
      <div class="chat-input-container">
        <textarea id="chatInput" class="chat-input" placeholder="Digite sua mensagem..." rows="1" onkeydown="handleInputKey(event)" oninput="autoResize(this)"></textarea>
        <button id="sendBtn" class="btn-send" onclick="sendMessage()" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    // ===== STATE =====
    let currentTab = 'login';
    let conversationHistory = [];
    let isLoading = false;

    // ===== DOM REFS =====
    const authScreen = document.getElementById('authScreen');
    const chatScreen = document.getElementById('chatScreen');
    const authForm = document.getElementById('authForm');
    const authError = document.getElementById('authError');
    const authBtn = document.getElementById('authBtn');
    const nameGroup = document.getElementById('nameGroup');
    const nameInput = document.getElementById('nameInput');
    const emailInput = document.getElementById('emailInput');
    const passwordInput = document.getElementById('passwordInput');
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    const welcomeScreen = document.getElementById('welcomeScreen');
    const userNameEl = document.getElementById('userName');

    // ===== INIT =====
    function init() {
      const token = localStorage.getItem('capi_token');
      const user = JSON.parse(localStorage.getItem('capi_user') || 'null');

      if (token && user) {
        showChat(user);
      } else {
        showAuth();
      }

      // Enable/disable send button based on input
      chatInput.addEventListener('input', () => {
        sendBtn.disabled = chatInput.value.trim() === '' || isLoading;
      });
    }

    // ===== AUTH =====
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.auth-tab').forEach(t => {
        t.classList.toggle('active', t.dataset.tab === tab);
      });

      if (tab === 'register') {
        nameGroup.classList.remove('hidden');
        nameInput.required = true;
        authBtn.textContent = 'Criar conta';
      } else {
        nameGroup.classList.add('hidden');
        nameInput.required = false;
        authBtn.textContent = 'Entrar';
      }

      hideError();
    }

    function showError(msg) {
      authError.textContent = msg;
      authError.classList.add('visible');
    }

    function hideError() {
      authError.textContent = '';
      authError.classList.remove('visible');
    }

    async function handleAuth(e) {
      e.preventDefault();
      hideError();
      authBtn.disabled = true;
      authBtn.textContent = currentTab === 'login' ? 'Entrando...' : 'Criando conta...';

      const endpoint = currentTab === 'login' ? '/api/login' : '/api/register';
      const body = {
        email: emailInput.value.trim(),
        password: passwordInput.value,
      };

      if (currentTab === 'register') {
        body.name = nameInput.value.trim();
      }

      try {
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || data.message || 'Erro ao processar. Tente novamente.');
        }

        // Save token and user
        localStorage.setItem('capi_token', data.token);
        localStorage.setItem('capi_user', JSON.stringify(data.user));

        showChat(data.user);
      } catch (err) {
        showError(err.message);
      } finally {
        authBtn.disabled = false;
        authBtn.textContent = currentTab === 'login' ? 'Entrar' : 'Criar conta';
      }
    }

    // ===== SCREENS =====
    function showAuth() {
      authScreen.classList.remove('hidden');
      chatScreen.classList.add('hidden');
      emailInput.value = '';
      passwordInput.value = '';
      nameInput.value = '';
      hideError();
    }

    function showChat(user) {
      authScreen.classList.add('hidden');
      chatScreen.classList.remove('hidden');
      userNameEl.textContent = user.name || user.email;
      chatInput.focus();
    }

    function logout() {
      localStorage.removeItem('capi_token');
      localStorage.removeItem('capi_user');
      conversationHistory = [];
      showAuth();
    }

    // ===== CHAT =====
    function newConversation() {
      conversationHistory = [];
      chatMessages.innerHTML = '';
      chatMessages.appendChild(createWelcomeScreen());
      chatInput.value = '';
      chatInput.style.height = 'auto';
      sendBtn.disabled = true;
    }

    function createWelcomeScreen() {
      const div = document.createElement('div');
      div.id = 'welcomeScreen';
      div.className = 'chat-welcome';
      div.innerHTML = `
        <span class="welcome-icon">🦫</span>
        <h3>Olá! Como posso te ajudar?</h3>
        <p>Sou a Capi, sua assistente estratégica para advocacia. Pergunte sobre prospecção, marketing jurídico, precificação e muito mais.</p>
        <div class="suggestion-chips">
          <button class="suggestion-chip" onclick="sendSuggestion(this)">Como prospectar no JusBrasil?</button>
          <button class="suggestion-chip" onclick="sendSuggestion(this)">Tese de Família para Meta Ads</button>
          <button class="suggestion-chip" onclick="sendSuggestion(this)">Como precificar honorários?</button>
          <button class="suggestion-chip" onclick="sendSuggestion(this)">Como sair de escritório massificado?</button>
        </div>
      `;
      return div;
    }

    function sendSuggestion(btn) {
      chatInput.value = btn.textContent;
      sendBtn.disabled = false;
      sendMessage();
    }

    async function sendMessage() {
      const text = chatInput.value.trim();
      if (!text || isLoading) return;

      // Remove welcome screen
      const welcome = document.getElementById('welcomeScreen');
      if (welcome) welcome.remove();

      // Add user message
      conversationHistory.push({ role: 'user', content: text });
      appendMessage('user', text);

      // Clear input
      chatInput.value = '';
      chatInput.style.height = 'auto';
      sendBtn.disabled = true;

      // Show typing indicator
      isLoading = true;
      const typingEl = showTypingIndicator();

      try {
        const token = localStorage.getItem('capi_token');

        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`,
          },
          body: JSON.stringify({ messages: conversationHistory }),
        });

        if (res.status === 401) {
          // Token expired
          removeTypingIndicator(typingEl);
          isLoading = false;
          logout();
          showError('Sessão expirada. Faça login novamente.');
          return;
        }

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Erro ao obter resposta.');
        }

        const assistantContent = data.response || data.message || data.content || '';
        conversationHistory.push({ role: 'assistant', content: assistantContent });

        removeTypingIndicator(typingEl);
        appendMessage('assistant', assistantContent);
      } catch (err) {
        removeTypingIndicator(typingEl);
        appendMessage('assistant', '⚠️ Desculpe, ocorreu um erro. Tente novamente.');
        console.error('Chat error:', err);
      } finally {
        isLoading = false;
        sendBtn.disabled = chatInput.value.trim() === '';
      }
    }

    function appendMessage(role, content) {
      const wrapper = document.createElement('div');
      wrapper.className = `message message-${role}`;

      const avatar = document.createElement('div');
      avatar.className = 'message-avatar';
      avatar.textContent = role === 'assistant' ? '🦫' : getInitials();

      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';
      bubble.innerHTML = formatMessage(content);

      wrapper.appendChild(avatar);
      wrapper.appendChild(bubble);
      chatMessages.appendChild(wrapper);

      scrollToBottom();
    }

    function formatMessage(text) {
      // Escape HTML
      let escaped = text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

      // Bold: **text**
      escaped = escaped.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

      // Line breaks
      escaped = escaped.replace(/\n/g, '<br>');

      return escaped;
    }

    function getInitials() {
      const user = JSON.parse(localStorage.getItem('capi_user') || '{}');
      const name = user.name || user.email || '?';
      return name.charAt(0).toUpperCase();
    }

    function showTypingIndicator() {
      const wrapper = document.createElement('div');
      wrapper.className = 'message message-assistant message-typing';
      wrapper.id = 'typingIndicator';

      const avatar = document.createElement('div');
      avatar.className = 'message-avatar';
      avatar.textContent = '🦫';

      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';
      bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

      wrapper.appendChild(avatar);
      wrapper.appendChild(bubble);
      chatMessages.appendChild(wrapper);

      scrollToBottom();
      return wrapper;
    }

    function removeTypingIndicator(el) {
      if (el && el.parentNode) {
        el.parentNode.removeChild(el);
      }
    }

    function scrollToBottom() {
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function handleInputKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (!sendBtn.disabled) {
          sendMessage();
        }
      }
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    // ===== BOOT =====
    init();
  </script>
</body>
</html>
