<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editor de Peça — Capi Când-IA Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset & Base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #b8960c;
      --gold-light: #d4ac14;
      --gold-dim: rgba(184,150,12,0.12);
      --bg: #faf8f5;
      --bg2: #fff;
      --bg3: #f5f3f0;
      --text: #1a1a1a;
      --text2: #666;
      --border: #e8e4de;
      --radius-card: 10px;
      --radius-btn: 20px;
      --sidebar-w: 340px;
      --header-h: 48px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
      --transition: 0.2s ease;
    }

    body.dark-mode {
      --bg: #141414;
      --bg2: #1e1e1e;
      --bg3: #252525;
      --text: #e8e4de;
      --text2: #999;
      --border: #333;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
      transition: background var(--transition), color var(--transition);
    }

    /* ─── Scrollbar ────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text2); }

    /* ─── Layout Shell ─────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ─── Header ───────────────────────────────────────────────────── */
    #header {
      height: var(--header-h);
      min-height: var(--header-h);
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      z-index: 100;
      transition: background var(--transition), border-color var(--transition);
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--text);
      flex: 1;
    }

    .logo-mark {
      width: 26px;
      height: 26px;
      flex-shrink: 0;
    }

    .logo-text {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .logo-text span {
      color: var(--gold);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ─── Buttons ──────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 16px;
      height: 32px;
      border-radius: var(--radius-btn);
      border: 1px solid var(--border);
      background: var(--bg2);
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
      text-decoration: none;
    }

    .btn:hover {
      background: var(--bg3);
      border-color: var(--text2);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-ghost {
      border-color: transparent;
      background: transparent;
    }

    .btn-ghost:hover {
      background: var(--bg3);
      border-color: transparent;
    }

    .btn-primary {
      background: var(--gold);
      border-color: var(--gold);
      color: #fff;
      font-weight: 600;
    }

    .btn-primary:hover {
      background: var(--gold-light);
      border-color: var(--gold-light);
    }

    .btn-primary:disabled,
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-sm {
      height: 26px;
      padding: 0 10px;
      font-size: 12px;
      border-radius: 14px;
    }

    .btn-icon {
      width: 32px;
      height: 32px;
      padding: 0;
      border-radius: 8px;
    }

    /* ─── Spinner ──────────────────────────────────────────────────── */
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    .spinner-dark {
      border-color: rgba(0,0,0,0.15);
      border-top-color: var(--text2);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ─── Main Body ────────────────────────────────────────────────── */
    #body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ─── Sidebar ──────────────────────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      max-width: var(--sidebar-w);
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background var(--transition), border-color var(--transition), transform var(--transition), width var(--transition);
    }

    .sidebar-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text2);
    }

    .sidebar-toggle-mobile {
      display: none;
      align-items: center;
      justify-content: center;
    }

    .sidebar-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ─── Form fields ──────────────────────────────────────────────── */
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text2);
      letter-spacing: 0.01em;
    }

    .field label .optional {
      font-weight: 400;
      opacity: 0.7;
    }

    textarea, input[type="text"], select {
      font-family: inherit;
      font-size: 13.5px;
      line-height: 1.65;
      color: var(--text);
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 10px 12px;
      width: 100%;
      resize: none;
      transition: border-color var(--transition), background var(--transition), box-shadow var(--transition);
      outline: none;
    }
    select { cursor: pointer; }
    select optgroup { font-weight: 600; color: var(--gold); }

    textarea::placeholder, input::placeholder {
      color: var(--text2);
      opacity: 0.65;
    }

    textarea:focus, input[type="text"]:focus, select:focus {
      border-color: var(--gold);
      background: var(--bg2);
      box-shadow: 0 0 0 3px var(--gold-dim);
    }

    #textarea-briefing {
      min-height: 180px;
      max-height: 400px;
      overflow-y: auto;
    }

    /* ─── Gerar button ─────────────────────────────────────────────── */
    #btn-gerar {
      width: 100%;
      height: 40px;
      border-radius: var(--radius-btn);
      font-size: 14px;
      margin-top: 4px;
    }

    /* ─── Alerts panel ─────────────────────────────────────────────── */
    #alerts-panel {
      display: none;
      flex-direction: column;
      gap: 10px;
      padding-top: 4px;
    }

    #alerts-panel.visible {
      display: flex;
    }

    .alerts-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text2);
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }

    .alert-item {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-left: 3px solid var(--gold);
      border-radius: var(--radius-card);
      padding: 10px 12px;
      font-size: 12.5px;
      line-height: 1.55;
      color: var(--text);
      animation: fadeInUp 0.3s ease both;
    }

    .alert-item.alert-warning {
      border-left-color: #e07b00;
    }

    .alert-item.alert-info {
      border-left-color: #0070c9;
    }

    .alert-type {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text2);
      margin-bottom: 3px;
    }

    /* ─── Editor area ──────────────────────────────────────────────── */
    #editor-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #editor-toolbar {
      padding: 10px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg2);
      transition: background var(--transition), border-color var(--transition);
    }

    .toolbar-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text2);
      flex: 1;
    }

    #editor-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 32px 40px;
    }

    /* ─── Empty state ──────────────────────────────────────────────── */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 400px;
      gap: 16px;
      text-align: center;
      color: var(--text2);
      user-select: none;
    }

    #empty-state svg {
      opacity: 0.2;
    }

    .empty-heading {
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
      opacity: 0.5;
    }

    .empty-sub {
      font-size: 13px;
      opacity: 0.6;
      max-width: 300px;
      line-height: 1.6;
    }

    /* ─── Document header ──────────────────────────────────────────── */
    #doc-header {
      display: none;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    #doc-header.visible {
      display: flex;
    }

    #doc-title-input {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
      background: transparent;
      border: none;
      border-radius: 6px;
      padding: 4px 6px;
      margin-left: -6px;
      color: var(--text);
    }

    #doc-title-input:focus {
      background: var(--bg3);
      box-shadow: none;
      border: none;
    }

    .doc-meta {
      font-size: 12px;
      color: var(--text2);
      padding-left: 6px;
    }

    /* ─── Section blocks ───────────────────────────────────────────── */
    #sections-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .section-block {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--gold);
      border-radius: var(--radius-card);
      overflow: hidden;
      transition: border-color var(--transition), box-shadow var(--transition);
      animation: fadeInUp 0.35s ease both;
    }

    .section-block:hover {
      box-shadow: var(--shadow-sm);
    }

    .section-block:focus-within {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-dim);
    }

    .section-header {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg3);
      gap: 10px;
      cursor: default;
    }

    .section-num {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--gold-dim);
      color: var(--gold);
      font-size: 11px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.01em;
      flex: 1;
      color: var(--text);
    }

    .section-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .section-body {
      padding: 0;
    }

    .section-textarea {
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 14px 16px;
      font-size: 13.5px;
      line-height: 1.75;
      min-height: 120px;
    }

    .section-textarea:focus {
      box-shadow: none;
      border: none;
    }

    /* ─── Regenerate inline input ──────────────────────────────────── */
    .regen-panel {
      display: none;
      padding: 10px 16px 12px;
      border-top: 1px solid var(--border);
      background: var(--bg3);
      gap: 8px;
      align-items: center;
    }

    .regen-panel.open {
      display: flex;
    }

    .regen-panel input {
      flex: 1;
      height: 30px;
      padding: 0 10px;
      border-radius: 8px;
      font-size: 12.5px;
    }

    .regen-panel .btn {
      height: 30px;
    }

    /* ─── Skeleton loading ─────────────────────────────────────────── */
    @keyframes shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position: 600px 0; }
    }

    .skeleton-block {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--border);
      border-radius: var(--radius-card);
      overflow: hidden;
      animation: fadeInUp 0.3s ease both;
    }

    .skeleton-block:nth-child(2) { animation-delay: 0.05s; }
    .skeleton-block:nth-child(3) { animation-delay: 0.10s; }
    .skeleton-block:nth-child(4) { animation-delay: 0.15s; }
    .skeleton-block:nth-child(5) { animation-delay: 0.20s; }

    .skeleton-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg3);
    }

    .skeleton-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .skeleton-line {
      height: 13px;
      border-radius: 6px;
      background: linear-gradient(
        90deg,
        var(--bg3) 25%,
        var(--border) 50%,
        var(--bg3) 75%
      );
      background-size: 600px 100%;
      animation: shimmer 1.4s infinite linear;
    }

    .skeleton-line.short { width: 55%; }
    .skeleton-line.medium { width: 78%; }
    .skeleton-line.long { width: 100%; }
    .skeleton-line.title { height: 16px; width: 40%; }

    /* ─── Animations ───────────────────────────────────────────────── */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ─── Mobile toggle bar ────────────────────────────────────────── */
    #mobile-tab-bar {
      display: none;
      height: 40px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      align-items: stretch;
    }

    .mobile-tab {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12.5px;
      font-weight: 500;
      color: var(--text2);
      cursor: pointer;
      border: none;
      background: transparent;
      font-family: inherit;
      transition: all var(--transition);
      border-bottom: 2px solid transparent;
    }

    .mobile-tab.active {
      color: var(--text);
      border-bottom-color: var(--gold);
    }

    /* ─── Toast notifications ──────────────────────────────────────── */
    #toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    .toast {
      background: var(--text);
      color: var(--bg);
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: var(--shadow-md);
      animation: toastIn 0.25s ease;
      pointer-events: auto;
      max-width: 320px;
    }

    .toast.error {
      background: #d32f2f;
      color: #fff;
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(8px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes toastOut {
      from { opacity: 1; transform: translateY(0); }
      to   { opacity: 0; transform: translateY(8px); }
    }

    /* ─── Responsive ───────────────────────────────────────────────── */
    @media (max-width: 768px) {
      #mobile-tab-bar {
        display: flex;
      }

      #body {
        flex-direction: column;
      }

      #sidebar {
        width: 100%;
        min-width: 100%;
        max-width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--border);
        flex: 1;
        overflow-y: auto;
      }

      #sidebar.hidden-mobile {
        display: none;
      }

      #editor-area.hidden-mobile {
        display: none;
      }

      #editor-scroll {
        padding: 20px 16px;
      }

      .header-actions .btn-back span {
        display: none;
      }

      #btn-exportar span {
        display: none;
      }
    }

    @media (min-width: 769px) {
      #mobile-tab-bar {
        display: none !important;
      }
    }

    /* ─── Divider ──────────────────────────────────────────────────── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 4px 0;
    }

    /* ─── Util ─────────────────────────────────────────────────────── */
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
    }

    .text-muted {
      color: var(--text2);
    }

    /* ─── Word count ───────────────────────────────────────────────── */
    .word-count {
      font-size: 11px;
      color: var(--text2);
      padding: 4px 16px 10px;
      text-align: right;
    }

    /* ─── Templates section ────────────────────────────────────────── */
    .templates-section { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
    .templates-label { font-size: .72rem; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
    .templates-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .template-btn { padding: 8px 10px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; font-size: .75rem; color: var(--text); cursor: pointer; text-align: left; transition: all .2s; font-family: inherit; }
    .template-btn:hover { border-color: var(--gold); color: var(--gold); }

    /* ─── Salvar button ────────────────────────────────────────────── */
    #btn-salvar { display: none; }

    /* ─── Minhas Peças panel ───────────────────────────────────────── */
    .minhas-pecas-wrapper {
      position: relative;
    }

    #panel-minhas-pecas {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      width: 340px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-md);
      z-index: 200;
      flex-direction: column;
      overflow: hidden;
      animation: fadeInUp 0.2s ease both;
    }

    #panel-minhas-pecas.open {
      display: flex;
    }

    .mp-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--border);
    }

    .mp-header-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .mp-close {
      background: none;
      border: none;
      color: var(--text2);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
    }

    .mp-close:hover { color: var(--text); background: var(--bg3); }

    .mp-list {
      max-height: 360px;
      overflow-y: auto;
    }

    .mp-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background var(--transition);
    }

    .mp-item:last-child { border-bottom: none; }
    .mp-item:hover { background: var(--bg3); }

    .mp-item-info {
      flex: 1;
      min-width: 0;
    }

    .mp-item-tipo {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mp-item-date {
      font-size: 11px;
      color: var(--text2);
      margin-top: 1px;
    }

    .mp-item-desc {
      font-size: 11.5px;
      color: var(--text2);
      margin-top: 3px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .mp-delete {
      background: none;
      border: none;
      color: var(--text2);
      cursor: pointer;
      font-size: 14px;
      padding: 2px 5px;
      border-radius: 4px;
      flex-shrink: 0;
      align-self: center;
    }

    .mp-delete:hover { color: #d32f2f; background: rgba(211,47,47,0.08); }

    .mp-empty {
      padding: 28px 16px;
      text-align: center;
      color: var(--text2);
      font-size: 13px;
    }

    .mp-loading {
      padding: 20px 16px;
      text-align: center;
      color: var(--text2);
      font-size: 13px;
    }
  </style>
</head>
<body>

<!-- ═══ JAVASCRIPT ════════════════════════════════════════════════════ -->
<script>
'use strict';

// ─── Config ───────────────────────────────────────────────────────────
const API_BASE   = '';
const TOKEN_KEY  = 'capi_token';
const DM_KEY     = 'darkMode';

// ─── State ────────────────────────────────────────────────────────────
let generatedSections = [];
let isGenerating      = false;
let currentTipo       = '';
let currentVara       = '';
let currentPecaId     = null;   // ID from saved peça (null = not yet saved)
let currentAlertasData = { alertas: [], estrategias: [], planoB: '' };
let minhasPecasOpen   = false;

// ─── Section definitions ──────────────────────────────────────────────
const SECTION_DEFS = [
  { id: 'qualificacao', title: 'Da Qualificação das Partes' },
  { id: 'fatos',        title: 'Dos Fatos' },
  { id: 'direito',      title: 'Do Direito' },
  { id: 'pedidos',      title: 'Dos Pedidos' },
  { id: 'encerramento', title: 'Do Encerramento e Requerimentos' },
];

// ─── Init ─────────────────────────────────────────────────────────────
(function init() {
  applyDarkMode();
  adjustAllTextareas();
  window.addEventListener('resize', adjustAllTextareas);
})();

function applyDarkMode() {
  if (localStorage.getItem(DM_KEY) === 'true') {
    document.body.classList.add('dark-mode');
  }
}

function getToken() {
  return localStorage.getItem(TOKEN_KEY) || '';
}

// ─── autoExpand textarea ──────────────────────────────────────────────
function autoExpand(el) {
  el.style.height = 'auto';
  el.style.height = (el.scrollHeight) + 'px';
}

function adjustAllTextareas() {
  document.querySelectorAll('textarea').forEach(t => autoExpand(t));
}

// ─── Mobile tab switching ─────────────────────────────────────────────
function switchMobileTab(tab) {
  const sidebar = document.getElementById('sidebar');
  const editor  = document.getElementById('editor-area');
  const tabB    = document.getElementById('tab-briefing');
  const tabE    = document.getElementById('tab-editor');

  if (tab === 'briefing') {
    sidebar.classList.remove('hidden-mobile');
    editor.classList.add('hidden-mobile');
    tabB.classList.add('active');
    tabE.classList.remove('active');
  } else {
    sidebar.classList.add('hidden-mobile');
    editor.classList.remove('hidden-mobile');
    tabB.classList.remove('active');
    tabE.classList.add('active');
  }
}

// ─── Navigation ───────────────────────────────────────────────────────
function voltarChat() {
  const confirmed = generatedSections.length === 0
    || confirm('Tem certeza? O rascunho atual será perdido.');
  if (confirmed) window.location.href = '/app';
}

// ─── Gerar peça ───────────────────────────────────────────────────────
async function gerarPeca() {
  const descricao = document.getElementById('textarea-briefing').value.trim();
  if (!descricao) {
    showToast('Descreva o caso antes de gerar.', 'error');
    document.getElementById('textarea-briefing').focus();
    return;
  }
  if (isGenerating) return;

  isGenerating   = true;
  const tipoSelect = document.getElementById('input-tipo-select');
  const tipoInput = document.getElementById('input-tipo');
  currentTipo = (tipoSelect && tipoSelect.value && tipoSelect.value !== '__custom__') ? tipoSelect.value : (tipoInput ? tipoInput.value.trim() : '');
  currentVara    = document.getElementById('input-vara').value.trim();

  // Build prompt payload
  let promptText = descricao;
  if (currentTipo) promptText += `\nTipo de peça: ${currentTipo}`;
  if (currentVara) promptText += `\nVara/Juízo: ${currentVara}`;

  // Button loading state
  setBtnLoading('btn-gerar', 'btn-gerar-label', 'Gerando...', true);

  // Show skeleton
  showSkeletons();
  showDocHeader();
  hideEmptyState();

  // Switch mobile to editor
  if (window.innerWidth <= 768) switchMobileTab('editor');

  try {
    const resp = await fetch(`${API_BASE}/api/peca/gerar`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${getToken()}`,
      },
      body: JSON.stringify({ descricao: promptText }),
    });

    if (!resp.ok) {
      const errBody = await resp.text().catch(() => '');
      throw new Error(`HTTP ${resp.status}: ${errBody.slice(0,200)}`);
    }
    const data = await resp.json();
    console.log('API response:', JSON.stringify(data).slice(0,300));

    if (!data.secoes || data.secoes.length === 0) {
      throw new Error('API retornou secoes vazio: ' + JSON.stringify(data).slice(0,300));
    }

    generatedSections = data.secoes;
    if (data.tipo_peca) currentTipo = data.tipo_peca;
    currentPecaId = null; // reset saved ID on new generation
    currentAlertasData = {
      alertas: data.alertas || [],
      estrategias: data.escolhas_estrategicas || [],
      planoB: data.plano_b || '',
    };
    renderSections(generatedSections);
    renderAlerts(currentAlertasData.alertas, currentAlertasData.estrategias, currentAlertasData.planoB);
    updateDocMeta();
    showToast('Peça gerada com sucesso.');
    document.getElementById('btn-salvar').style.display = '';

  } catch (err) {
    console.error('Erro ao gerar peça:', err);
    showToast('Erro ao gerar: ' + err.message, true);
  } finally {
    isGenerating = false;
    setBtnLoading('btn-gerar', 'btn-gerar-label', 'Gerar Peça', false);
    document.getElementById('btn-toggle-all').style.display = '';
  }
}

// ─── Templates rápidos ───────────────────────────────────────────────
const TEMPLATES = {
  consumidor: 'Meu cliente comprou [produto/serviço] no valor de R$ [valor]. O produto/serviço apresentou defeito/falha em [prazo]. Tentou resolver com a empresa [tentativas], mas não obteve solução em [prazo]. Sofreu prejuízos: [descrever]. Local: [cidade/UF].',
  trabalhista: 'Meu cliente trabalhou na empresa [nome] de [data início] a [data fim], na função de [cargo], com salário de R$ [valor]. Foi dispensado [com/sem justa causa]. Não recebeu [verbas]. Durante o contrato: [descrever irregularidades: horas extras, assédio, desvio de função, etc.]. Local: [cidade/UF].',
  familia: 'Minha cliente conviveu em [casamento/união estável] com [nome] por [X anos]. Têm [X] filho(s) menor(es). A relação chegou ao fim há [prazo]. Precisa de [divórcio/dissolução], [guarda], [alimentos] e [partilha de bens: descrever]. Local: [cidade/UF].',
  previdenciario: 'Meu cliente tem [X anos] de idade, contribuiu por [X anos] ao INSS. Requereu [tipo de benefício] em [data] mas foi indeferido porque [motivo]. Trabalhou como [atividades]. Tem [condição de saúde se relevante]. Local: [cidade/UF].',
  criminal: 'Meu cliente foi [preso/denunciado/investigado] por [tipo penal]. Os fatos ocorreram em [data] em [local]. [Descrever circunstâncias]. Está [preso/solto]. Precisa de [habeas corpus/defesa prévia/resposta à acusação]. Local: [cidade/UF].',
  indenizacao: 'Meu cliente sofreu [tipo de dano: acidente, erro médico, negativação indevida, etc.] em [data]. O responsável é [quem]. Os prejuízos foram: [materiais: R$ valor] e [morais: descrever impacto]. Tentou resolver [como]. Local: [cidade/UF].',
};

function aplicarTemplate(key) {
  const ta = document.getElementById('textarea-briefing');
  if (!ta) return;
  ta.value = TEMPLATES[key] || '';
  autoExpand(ta);
  ta.focus();
  // Place cursor at first placeholder
  const firstBracket = ta.value.indexOf('[');
  if (firstBracket !== -1) ta.setSelectionRange(firstBracket, firstBracket);
}

// ─── Salvar peça ──────────────────────────────────────────────────────
async function salvarPeca() {
  if (generatedSections.length === 0) {
    showToast('Nada para salvar.', 'error');
    return;
  }

  const btn = document.getElementById('btn-salvar');
  const origHtml = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner spinner-dark"></span><span>Salvando…</span>';

  const descricao = document.getElementById('textarea-briefing').value.trim();
  // Collect current textarea values into sections
  const secoes = generatedSections.map(s => ({
    id: s.id,
    titulo: s.titulo,
    conteudo: document.getElementById(`section-textarea-${s.id}`)?.value || s.conteudo,
  }));

  const payload = {
    tipo_peca: currentTipo || 'Peça Jurídica',
    descricao,
    secoes,
    alertas: currentAlertasData.alertas,
    plano_b: currentAlertasData.planoB,
    escolhas_estrategicas: currentAlertasData.estrategias,
  };

  try {
    let resp;
    if (currentPecaId) {
      // Update existing
      resp = await fetch(`${API_BASE}/api/pecas/${currentPecaId}`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${getToken()}`,
        },
        body: JSON.stringify(payload),
      });
    } else {
      // Create new
      resp = await fetch(`${API_BASE}/api/pecas`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${getToken()}`,
        },
        body: JSON.stringify(payload),
      });
    }

    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    if (data.id) currentPecaId = data.id;
    showToast('Peça salva com sucesso.');
  } catch (err) {
    console.error('Erro ao salvar peça:', err);
    showToast('Erro ao salvar: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = origHtml;
  }
}

// ─── Minhas Peças ────────────────────────────────────────────────────
function toggleMinhasPecas() {
  const panel = document.getElementById('panel-minhas-pecas');
  if (panel.classList.contains('open')) {
    fecharMinhasPecas();
  } else {
    abrirMinhasPecas();
  }
}

function fecharMinhasPecas() {
  document.getElementById('panel-minhas-pecas').classList.remove('open');
  minhasPecasOpen = false;
}

async function abrirMinhasPecas() {
  const panel = document.getElementById('panel-minhas-pecas');
  const list  = document.getElementById('mp-list');
  panel.classList.add('open');
  minhasPecasOpen = true;

  list.innerHTML = '<div class="mp-loading">Carregando…</div>';

  try {
    const resp = await fetch(`${API_BASE}/api/pecas`, {
      headers: { 'Authorization': `Bearer ${getToken()}` },
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    const pecas = Array.isArray(data) ? data : (data.pecas || data.items || []);
    renderMinhasPecas(pecas);
  } catch (err) {
    console.error('Erro ao carregar peças:', err);
    list.innerHTML = `<div class="mp-empty">Erro ao carregar peças.<br><small>${escHtml(err.message)}</small></div>`;
  }
}

function renderMinhasPecas(pecas) {
  const list = document.getElementById('mp-list');
  if (!pecas || pecas.length === 0) {
    list.innerHTML = '<div class="mp-empty">Nenhuma peça salva ainda.</div>';
    return;
  }

  list.innerHTML = pecas.map(p => {
    const tipo = escHtml(p.tipo_peca || 'Peça Jurídica');
    const desc = escHtml((p.descricao || '').slice(0, 80));
    const rawDate = p.created_at || p.data || p.updated_at || '';
    const date = rawDate ? new Date(rawDate).toLocaleDateString('pt-BR', { dateStyle: 'short' }) : '';
    return `
      <div class="mp-item" onclick="carregarPeca(${JSON.stringify(p).replace(/"/g, '&quot;')})">
        <div class="mp-item-info">
          <div class="mp-item-tipo">${tipo}</div>
          ${ date ? `<div class="mp-item-date">${date}</div>` : '' }
          ${ desc ? `<div class="mp-item-desc">${desc}${p.descricao && p.descricao.length > 80 ? '…' : ''}</div>` : '' }
        </div>
        <button class="mp-delete" onclick="event.stopPropagation(); deletarPeca('${escHtml(p.id || '')}', this.closest('.mp-item'))" title="Apagar peça">×</button>
      </div>
    `;
  }).join('');
}

function carregarPeca(p) {
  fecharMinhasPecas();

  currentPecaId = p.id || null;
  currentTipo   = p.tipo_peca || '';

  // Fill briefing textarea
  const ta = document.getElementById('textarea-briefing');
  ta.value = p.descricao || '';
  autoExpand(ta);

  // Fill tipo/vara if available
  const tipoSel = document.getElementById('input-tipo-select');
  const tipoInp = document.getElementById('input-tipo');
  const tipoPeca = p.tipo_peca || '';
  // Try to match in select options first
  let matched = false;
  if (tipoSel) {
    for (let opt of tipoSel.options) {
      if (opt.value === tipoPeca) { tipoSel.value = tipoPeca; matched = true; break; }
    }
    if (!matched && tipoPeca) { tipoSel.value = '__custom__'; tipoInp.style.display = 'block'; tipoInp.value = tipoPeca; }
    else if (matched) { tipoInp.style.display = 'none'; tipoInp.value = tipoPeca; }
  } else { tipoInp.value = tipoPeca; }

  if (p.secoes && p.secoes.length > 0) {
    generatedSections = p.secoes;
    currentAlertasData = {
      alertas: p.alertas || [],
      estrategias: p.escolhas_estrategicas || [],
      planoB: p.plano_b || '',
    };

    hideEmptyState();
    showDocHeader();
    renderSections(generatedSections);
    renderAlerts(currentAlertasData.alertas, currentAlertasData.estrategias, currentAlertasData.planoB);
    updateDocMeta();
    document.getElementById('btn-salvar').style.display = '';
    document.getElementById('btn-toggle-all').style.display = '';
    showToast('Peça carregada.');
  } else {
    showToast('Peça carregada — sem seções para exibir.', 'error');
  }
}

async function deletarPeca(id, el) {
  if (!id) return;
  if (!confirm('Apagar esta peça salva?')) return;
  try {
    const resp = await fetch(`${API_BASE}/api/pecas/${id}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${getToken()}` },
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    el.remove();
    const list = document.getElementById('mp-list');
    if (!list.querySelector('.mp-item')) {
      list.innerHTML = '<div class="mp-empty">Nenhuma peça salva ainda.</div>';
    }
    // If the deleted peça is the current one, reset ID
    if (String(currentPecaId) === String(id)) currentPecaId = null;
    showToast('Peça apagada.');
  } catch (err) {
    showToast('Erro ao apagar: ' + err.message, 'error');
  }
}

// ─── Regenerar seção ──────────────────────────────────────────────────
async function regenerarSecao(sectionId) {
  const panel    = document.getElementById(`regen-panel-${sectionId}`);
  const instrucao = document.getElementById(`regen-input-${sectionId}`).value.trim();
  const textarea = document.getElementById(`section-textarea-${sectionId}`);
  const btn      = document.getElementById(`btn-regen-${sectionId}`);

  if (!instrucao) {
    showToast('Informe o que quer mudar nesta seção.', 'error');
    document.getElementById(`regen-input-${sectionId}`).focus();
    return;
  }

  // Loading state on regen button
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner spinner-dark"></span>';

  // Subtle loading on textarea
  textarea.style.opacity = '0.4';
  textarea.style.transition = 'opacity 0.3s ease';

  const descricao = document.getElementById('textarea-briefing').value.trim();
  const sectionDef = SECTION_DEFS.find(s => s.id === sectionId);

  try {
    const resp = await fetch(`${API_BASE}/api/peca/regenerar-secao`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${getToken()}`,
      },
      body: JSON.stringify({
        secao_id: sectionId,
        secao_titulo: sectionDef?.title || sectionId,
        instrucao,
        descricao,
        conteudo_atual: textarea.value,
      }),
    });

    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();

    const newContent = data.conteudo || mockRegenContent(sectionDef?.title, instrucao);
    textarea.value = newContent;
    autoExpand(textarea);
    showToast(`Seção "${sectionDef?.title}" atualizada.`);
    closeRegenPanel(sectionId);

    // Update state
    const idx = generatedSections.findIndex(s => s.id === sectionId);
    if (idx !== -1) generatedSections[idx].conteudo = newContent;

  } catch (err) {
    console.warn('Regen API unavailable, using mock:', err);
    const newContent = mockRegenContent(sectionDef?.title, instrucao);
    textarea.value = newContent;
    autoExpand(textarea);
    showToast(`Seção atualizada (modo demo).`);
    closeRegenPanel(sectionId);

    const idx = generatedSections.findIndex(s => s.id === sectionId);
    if (idx !== -1) generatedSections[idx].conteudo = newContent;

  } finally {
    textarea.style.opacity = '';
    btn.disabled = false;
    btn.innerHTML = refreshIcon();
  }
}

// ─── Toggle regen panel ───────────────────────────────────────────────
function toggleRegenPanel(sectionId) {
  const panel = document.getElementById(`regen-panel-${sectionId}`);
  const isOpen = panel.classList.contains('open');
  // Close all others
  document.querySelectorAll('.regen-panel.open').forEach(p => {
    if (p.id !== `regen-panel-${sectionId}`) p.classList.remove('open');
  });
  panel.classList.toggle('open', !isOpen);
  if (!isOpen) {
    setTimeout(() => document.getElementById(`regen-input-${sectionId}`)?.focus(), 60);
  }
}

function closeRegenPanel(sectionId) {
  const panel = document.getElementById(`regen-panel-${sectionId}`);
  if (panel) panel.classList.remove('open');
}

// ─── Exportar ─────────────────────────────────────────────────────────
async function exportarPeca() {
  if (generatedSections.length === 0) {
    showToast('Gere uma peça antes de exportar.', 'error');
    return;
  }

  const titulo  = document.getElementById('doc-title-input').value || 'Peça Jurídica';
  const secoes  = generatedSections.map(s => ({
    id: s.id,
    titulo: s.titulo,
    conteudo: document.getElementById(`section-textarea-${s.id}`)?.value || s.conteudo,
  }));

  const exportBtn = document.getElementById('btn-exportar');
  const origHtml  = exportBtn.innerHTML;
  exportBtn.disabled = true;
  exportBtn.innerHTML = '<span class="spinner spinner-dark"></span><span>Exportando</span>';

  try {
    const resp = await fetch(`${API_BASE}/api/peca/exportar`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${getToken()}`,
      },
      body: JSON.stringify({ titulo, secoes }),
    });

    if (resp.ok) {
      const ct = resp.headers.get('Content-Type') || '';
      if (ct.includes('text/html')) {
        const html = await resp.text();
        const win = window.open('', '_blank');
        if (win) {
          win.document.write(html);
          win.document.close();
        } else {
          downloadBlob(new Blob([html], { type: 'text/html' }), `${titulo}.html`);
        }
      } else {
        const blob = await resp.blob();
        downloadBlob(blob, `${titulo}.docx`);
      }
      showToast('Exportação concluída.');
    } else {
      throw new Error(`HTTP ${resp.status}`);
    }
  } catch (err) {
    console.warn('Export API unavailable, generating local HTML:', err);
    const html = buildExportHtml(titulo, secoes, currentTipo, currentVara);
    const win = window.open('', '_blank');
    if (win) {
      win.document.write(html);
      win.document.close();
    } else {
      downloadBlob(new Blob([html], { type: 'text/html' }), `${titulo}.html`);
    }
    showToast('Documento aberto para impressão.');
  } finally {
    exportBtn.disabled = false;
    exportBtn.innerHTML = origHtml;
  }
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a   = document.createElement('a');
  a.href     = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function renderSections(sections) {
  const container = document.getElementById('sections-container');
  container.innerHTML = '';

  sections.forEach((sec, idx) => {
    const block = document.createElement('div');
    block.className  = 'section-block';
    block.id         = `section-block-${sec.id}`;
    block.style.animationDelay = `${idx * 0.06}s`;
    block.innerHTML  = buildSectionHtml(sec, idx + 1);
    container.appendChild(block);

    // autoExpand the textarea after insertion
    const ta = block.querySelector('textarea');
    if (ta) {
      requestAnimationFrame(() => autoExpand(ta));
      ta.addEventListener('input', () => autoExpand(ta));
    }
  });

function buildSectionHtml(sec, num) {
  const safeContent = escHtml(sec.conteudo || '');
  return `

function renderAlerts(alertas, estrategias, planoB) {
  const panel = document.getElementById('alerts-panel');
  const list  = document.getElementById('alerts-list');
  list.innerHTML = '';

  // Alertas (strings ou objetos)
  const alertList = Array.isArray(alertas) ? alertas : [];
  alertList.forEach(a => {
    const msg = typeof a === 'string' ? a : (a.mensagem || '');
    const tipo = typeof a === 'string' ? 'warning' : (a.tipo || 'warning');
    const item = document.createElement('div');
    item.className = `alert-item alert-${tipo}`;
    item.innerHTML = `<div class="alert-type">${escHtml(labelForAlertType(tipo))}</div>${escHtml(msg)}`;
    list.appendChild(item);
  });

  // Escolhas estratégicas
  const stratList = Array.isArray(estrategias) ? estrategias : [];
  stratList.forEach(e => {
    const item = document.createElement('div');
    item.className = 'alert-item alert-strategy';
    item.innerHTML = `<div class="alert-type">Estratégia</div>${escHtml(typeof e === 'string' ? e : e.mensagem || '')}`;
    list.appendChild(item);
  });

  // Plano B
  if (planoB) {
    const item = document.createElement('div');
    item.className = 'alert-item alert-planb';
    item.innerHTML = `<div class="alert-type">Plano B</div>${escHtml(planoB)}`;
    list.appendChild(item);
  }

  if (list.children.length > 0) panel.classList.add('visible');
}

function labelForAlertType(tipo) {
  const map = { warning: 'Atenção', info: 'Informação', strategy: 'Estratégia', planb: 'Plano B' };
  return map[tipo] || 'Nota';
}

function updateDocMeta() {
  const tipo  = currentTipo || 'Peça Jurídica';
  const vara  = currentVara ? ` — ${currentVara}` : '';
  const now   = new Date().toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' });

  document.getElementById('doc-title-input').value    = tipo.charAt(0).toUpperCase() + tipo.slice(1);
  document.getElementById('doc-meta-info').textContent = `Gerada em ${now}${vara}`;
  document.getElementById('toolbar-title').textContent = tipo.charAt(0).toUpperCase() + tipo.slice(1);
}

function toggleAllSections() {
  const btn  = document.getElementById('btn-toggle-all');
  const all  = document.querySelectorAll('.section-textarea');
  const any  = document.querySelectorAll('.regen-panel.open');
  any.forEach(p => p.classList.remove('open'));
  // Toggle expand/collapse bodies
  const isCollapsed = btn.textContent.trim() === 'Expandir tudo';
  all.forEach(ta => {
    ta.closest('.section-body').style.display = isCollapsed ? '' : 'none';
  });
  btn.textContent = isCollapsed ? 'Recolher tudo' : 'Expandir tudo';
}

function setBtnLoading(btnId, labelId, text, loading) {
  const btn   = document.getElementById(btnId);
  const label = document.getElementById(labelId);
  if (loading) {
    btn.disabled = true;
    btn.insertAdjacentHTML('afterbegin', '<span class="spinner"></span>');
    label.textContent = text;
  } else {
    btn.disabled = false;
    const spinner = btn.querySelector('.spinner');
    if (spinner) spinner.remove();
    label.textContent = text;
  }
}
