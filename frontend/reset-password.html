<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criar senha — Capi Când-IA Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#050a05;color:#e8f5e9;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{width:100%;max-width:420px;background:#0a110a;border:1px solid rgba(0,230,118,.13);border-radius:12px;padding:36px;position:relative;overflow:hidden}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#00e676,transparent)}
  h1{font-family:'Rajdhani',sans-serif;font-size:1.8rem;font-weight:700;letter-spacing:.06em;text-align:center;margin-bottom:6px}
  h1 span{color:#ffd700}
  .sub{text-align:center;color:#a5d6a7;font-size:.82rem;margin-bottom:28px}
  label{display:block;font-size:.72rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#a5d6a7;margin-bottom:7px}
  input{width:100%;padding:11px 15px;background:#0f180f;border:1px solid rgba(0,230,118,.13);border-radius:8px;color:#e8f5e9;font-family:'Inter',sans-serif;font-size:.93rem;outline:none;margin-bottom:16px}
  input:focus{border-color:#00e676;box-shadow:0 0 0 3px rgba(0,230,118,.1)}
  button{width:100%;padding:13px;background:linear-gradient(135deg,#00c853,#00e676);border:none;border-radius:8px;color:#050a05;font-family:'Rajdhani',sans-serif;font-size:.95rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;margin-top:4px}
  button:disabled{opacity:.5;cursor:not-allowed}
  .msg{padding:10px 14px;border-radius:8px;font-size:.84rem;margin-bottom:16px;display:none}
  .msg.error{background:rgba(244,67,54,.1);border:1px solid rgba(244,67,54,.3);color:#ef9a9a}
  .msg.success{background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.3);color:#a5d6a7}
</style>
</head>
<body>
<div class="card">
  <h1>CAPI <span>CÂND-IA</span> PRO</h1>
  <p class="sub">Crie sua senha de acesso</p>
  <div id="msg" class="msg"></div>
  <div id="formArea">
    <label>Nova senha</label>
    <input type="password" id="pass1" placeholder="Mínimo 6 caracteres" minlength="6">
    <label>Confirmar senha</label>
    <input type="password" id="pass2" placeholder="Repita a senha">
    <button id="btn" onclick="resetPassword()">Criar minha senha</button>
  </div>
  <div id="successArea" style="display:none;text-align:center">
    <p style="color:#a5d6a7;margin-bottom:20px">Senha criada com sucesso! Agora você pode entrar.</p>
    <a href="/" style="background:linear-gradient(135deg,#00c853,#00e676);color:#050a05;padding:13px 32px;border-radius:8px;text-decoration:none;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:.1em;text-transform:uppercase">Ir para o login</a>
  </div>
</div>
<script>
const token = new URLSearchParams(location.search).get('token');
if (!token) { document.getElementById('msg').className='msg error'; document.getElementById('msg').textContent='Link inválido.'; document.getElementById('msg').style.display='block'; document.getElementById('formArea').style.display='none'; }

async function resetPassword(){
  const p1 = document.getElementById('pass1').value;
  const p2 = document.getElementById('pass2').value;
  const msg = document.getElementById('msg');
  msg.style.display='none';
  if(p1.length < 6){ msg.className='msg error'; msg.textContent='Senha deve ter no mínimo 6 caracteres.'; msg.style.display='block'; return; }
  if(p1 !== p2){ msg.className='msg error'; msg.textContent='As senhas não coincidem.'; msg.style.display='block'; return; }
  document.getElementById('btn').disabled=true;
  document.getElementById('btn').textContent='Salvando...';
  try{
    const res = await fetch('/api/auth/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,password:p1})});
    const data = await res.json();
    if(!res.ok) throw new Error(data.error||'Erro ao redefinir senha.');
    document.getElementById('formArea').style.display='none';
    document.getElementById('successArea').style.display='block';
  }catch(e){
    msg.className='msg error'; msg.textContent=e.message; msg.style.display='block';
    document.getElementById('btn').disabled=false;
    document.getElementById('btn').textContent='Criar minha senha';
  }
}
</script>
</body>
</html>
